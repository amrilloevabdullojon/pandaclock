<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" role="img" aria-label="Pandi обнимает большой будильник">
  <defs>
    <linearGradient id="clockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4B942" />
      <stop offset="100%" stop-color="#ED7280" />
    </linearGradient>
  </defs>

  <!-- Будильник большой -->
  <g transform="translate(120,128)">
    <!-- Кнопка сверху -->
    <rect x="-22" y="-78" width="44" height="14" rx="6" fill="#F4B942" />
    <!-- "Ножки" будильника -->
    <line x1="-40" y1="-58" x2="-58" y2="-80" stroke="#1F2233" stroke-width="5" stroke-linecap="round" />
    <line x1="40" y1="-58" x2="58" y2="-80" stroke="#1F2233" stroke-width="5" stroke-linecap="round" />
    <circle cx="-58" cy="-80" r="10" fill="#1F2233" />
    <circle cx="58" cy="-80" r="10" fill="#1F2233" />
    <!-- Корпус -->
    <circle r="62" fill="url(#clockGrad)" stroke="#1F2233" stroke-width="3" />
    <circle r="50" fill="#FFFFFF" stroke="#1F2233" stroke-width="2.5" />
    <!-- Цифры (точки 12-3-6-9) -->
    <circle cx="0" cy="-40" r="2.5" fill="#1F2233" />
    <circle cx="40" cy="0" r="2.5" fill="#1F2233" />
    <circle cx="0" cy="40" r="2.5" fill="#1F2233" />
    <circle cx="-40" cy="0" r="2.5" fill="#1F2233" />
    <!-- Стрелки -->
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#5B4FE2" stroke-width="4" stroke-linecap="round" />
    <line x1="0" y1="0" x2="22" y2="6" stroke="#5B4FE2" stroke-width="3" stroke-linecap="round" />
    <circle r="4" fill="#5B4FE2" />
  </g>

  <!-- Голова панды (выглядывает справа из-за будильника) -->
  <g transform="translate(178,142)">
    <circle r="32" fill="#FFFFFF" stroke="#1F2233" stroke-width="3" />
    <circle cx="-22" cy="-22" r="11" fill="#1F2233" />
    <circle cx="22" cy="-22" r="11" fill="#1F2233" />
    <ellipse cx="-10" cy="-2" rx="8" ry="11" fill="#1F2233" transform="rotate(-18 -10 -2)" />
    <ellipse cx="10" cy="-2" rx="8" ry="11" fill="#1F2233" transform="rotate(18 10 -2)" />
    <circle cx="-9" cy="0" r="3.5" fill="#FFFFFF" />
    <circle cx="11" cy="0" r="3.5" fill="#FFFFFF" />
    <circle cx="-8" cy="1" r="1.8" fill="#1F2233" />
    <circle cx="12" cy="1" r="1.8" fill="#1F2233" />
    <ellipse cx="1" cy="11" rx="3" ry="2.2" fill="#1F2233" />
    <path d="M-7 17 Q1 23 9 17" stroke="#1F2233" stroke-width="2" stroke-linecap="round" fill="none" />
  </g>

  <!-- Лапка обнимает будильник слева -->
  <ellipse cx="62" cy="158" rx="14" ry="20" fill="#1F2233" transform="rotate(-25 62 158)" />
</svg>
