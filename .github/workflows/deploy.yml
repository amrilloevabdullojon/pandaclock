name: Deploy

# Деплой запускается только на push в main и только после успешного CI.
# Web → Vercel, API → fly.io. Mobile деплоится вручную через `eas build`.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # для ручного запуска из UI

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # деплои не отменяем, чтобы не получить «застрявший» middle-state

jobs:
  deploy-api:
    name: Deploy API to fly.io
    runs-on: ubuntu-latest
    # Запускается только если есть FLY_API_TOKEN в secrets (на форках не сработает)
    if: ${{ vars.DEPLOY_API_ENABLED != 'false' && github.repository_owner == 'amrilloevabdullojon' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to fly
        run: flyctl deploy --config apps/api/fly.toml --dockerfile apps/api/Dockerfile --app pandaclock-api-staging --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_WEB_ENABLED != 'false' && github.repository_owner == 'amrilloevabdullojon' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Делаем deploy одной командой — Vercel build-runner сам поставит pnpm
      # и выполнит installCommand/buildCommand из vercel.json. Это надёжнее
      # чем vercel build локально + --prebuilt (на GH-runner нет pnpm в PATH
      # для child-shell, который запускает vercel).
      # Vercel сам auto-aliases production deployment на canonical-домен
      # проекта (для нас pandaclock-web-iota.vercel.app — суффикс -iota
       # потому что pandaclock-web.vercel.app принадлежит другому аккаунту).
      # Никаких ручных `vercel alias set` не нужно.
      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
