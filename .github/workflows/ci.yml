name: CI

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pandaclock_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Версия pnpm берётся из root package.json → packageManager
        # (нельзя дублировать в with: иначе action ругается v4)
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @pandaclock/db
        # @pandaclock/db экспортирует через ./dist/*.js (prisma generate + tsc).
        # Без сборки api ругается TS2307 «Cannot find module '@pandaclock/db'».
        run: pnpm --filter @pandaclock/db build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pandaclock_test
          REDIS_URL: redis://localhost:6379

      - name: Build
        run: pnpm build
